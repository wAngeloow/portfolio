<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <meta name="theme-color" content="#010B2F">

    <!--Primary meta tags-->
    <title>404 - Página não encontrada</title>
    <meta name="robots" content="noindex, follow">
    <meta name="author" content="Angelo Donada">
    <meta name="description" content="Ops! A página que você está procurando não existe ou foi movida.">

    <!--Favicons-->
    <link rel="icon" href="assets/img/common/favicon.ico" sizes="any">
    <link rel="icon" href="assets/icons/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="assets/img/common/apple-touch-icon.png">

    <!--Styles-->
    <link href="../assets/css/output.css" rel="stylesheet">

    <!--Font Awesome-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <!--Google Fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
</head>

<body class="bg-primary-700 font-poppins">

    <!--Start of main-->
    <main class="relative flex justify-center overflow-hidden">

        <!--Centered content wrapper-->
        <div class="flex h-screen w-full flex-col items-center justify-center">
            <h1 class="text-[150px] font-extrabold text-accent/80 md:text-[200px]">404</h1>

            <!--Error message content-->
            <div class="flex flex-col items-center gap-[30px]">
                <div>
                    <h2 class="text-center text-[48px] font-semibold text-accent">Ooops!</h2>
                    <p class="text-center text-[16px] text-white">Parece que a página não foi encontrada.</p>
                </div>

                <!--Return to homepage button-->
                <a href="index.html" class="flex h-[41px] w-[150px] items-center justify-center rounded-full border-[1px] border-white text-[14px] font-semibold text-white 
          transition-all duration-300 ease-in-out 
          hover:bg-white hover:text-primary-700">
                    Voltar ao início
                </a>
            </div>
        </div>

        <!--Decorative background glow-->
        <div class="pointer-events-none absolute bottom-[-150px] z-[1] h-[300px] w-[300px] rounded-full bg-accent blur-[200px]

        md:bottom-[-200px] md:h-[400px] md:w-[400px] md:blur-[250px]

        xl:bottom-[-300px] xl:h-[500px] xl:w-[500px] xl:blur-[350px]">
        </div>

    </main>
    <!--End of main-->

</body>

</html>
